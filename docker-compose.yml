services:
  postgres:
    image: postgres:16-alpine
    container_name: pilot_tracker_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pilot_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-pilot_tracker}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pilot_tracker_backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/pilot_tracker}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      WORK_HOURS_PER_WEEK: ${WORK_HOURS_PER_WEEK:-40}
      COST_PER_MINUTE: ${COST_PER_MINUTE:-23}
      TRINO_HOST: ${TRINO_HOST:-}
      TRINO_PORT: ${TRINO_PORT:-8080}
      TRINO_USER: ${TRINO_USER:-}
      TRINO_PASSWORD: ${TRINO_PASSWORD:-}
      TRINO_CATALOG: ${TRINO_CATALOG:-}
      TRINO_SCHEMA: ${TRINO_SCHEMA:-}
      TRINO_HTTP_SCHEME: ${TRINO_HTTP_SCHEME:-http}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pilot_tracker_frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
